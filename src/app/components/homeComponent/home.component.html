<!-- Banner principal da empresa -->
<section class="hero">

  <!-- Conteúdo textual do banner -->
  <div class="hero__conteudo">
    <span class="hero__tag">Energia que move o futuro</span>
    <h2 class="hero__titulo">
      Liderança em exploração <br>
      de <span class="hero__destaque">petróleo e gás</span>
    </h2>
    <p class="hero__texto">
      Há mais de 23 anos fornecendo energia com segurança,
      inovação e responsabilidade ambiental para o Brasil e o mundo.
    </p>

    <!-- Botões de ação -->
    <div class="hero__acoes">
      <a routerLink="/sobre" class="hero__botao hero__botao--primario">Conheça a empresa</a>
      <a routerLink="/projetos" class="hero__botao hero__botao--secundario">Ver projetos sociais</a>
    </div>
  </div>

  <!-- Painel lateral com números rápidos -->
  <div class="hero__numeros">

    <div class="hero__numero-item">
      <span class="hero__numero-valor">+23</span>
      <span class="hero__numero-rotulo">Anos de mercado</span>
    </div>

    <div class="hero__separador"></div>

    <div class="hero__numero-item">
      <span class="hero__numero-valor">12</span>
      <span class="hero__numero-rotulo">Países de atuação</span>
    </div>

    <div class="hero__separador"></div>

    <div class="hero__numero-item">
      <span class="hero__numero-valor">8.500</span>
      <span class="hero__numero-rotulo">Colaboradores</span>
    </div>

  </div>

</section>
